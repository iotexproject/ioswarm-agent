name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Build binaries
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          LDFLAGS="-s -w -X main.version=${TAG}"
          mkdir -p dist
          GOOS=linux   GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o dist/ioswarm-agent-linux-amd64 .
          GOOS=linux   GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o dist/ioswarm-agent-linux-arm64 .
          GOOS=darwin  GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o dist/ioswarm-agent-darwin-amd64 .
          GOOS=darwin  GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o dist/ioswarm-agent-darwin-arm64 .
          GOOS=windows GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o dist/ioswarm-agent-windows-amd64.exe .

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create ${GITHUB_REF#refs/tags/} dist/* --generate-notes

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          push: true
          tags: |
            raullen/ioswarm-agent:${{ github.ref_name }}
            raullen/ioswarm-agent:latest

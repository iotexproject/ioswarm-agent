<svg xmlns="http://www.w3.org/2000/svg" width="800" height="200" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06060c"/>
      <stop offset="100%" style="stop-color:#0e0b18"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e63946;stop-opacity:0.5"/>
      <stop offset="50%" style="stop-color:#ff6b35;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#e63946;stop-opacity:0.5"/>
    </linearGradient>
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="30%">
      <stop offset="0%" style="stop-color:#ff6b35;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#ff6b35;stop-opacity:0"/>
    </radialGradient>
    <filter id="textGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="200" fill="url(#bg)"/>

  <!-- Faint grid -->
  <g opacity="0.04" stroke="#ff6b35" stroke-width="0.5">
    <line x1="0" y1="50" x2="800" y2="50"/><line x1="0" y1="100" x2="800" y2="100"/><line x1="0" y1="150" x2="800" y2="150"/>
    <line x1="100" y1="0" x2="100" y2="200"/><line x1="200" y1="0" x2="200" y2="200"/>
    <line x1="300" y1="0" x2="300" y2="200"/><line x1="400" y1="0" x2="400" y2="200"/>
    <line x1="500" y1="0" x2="500" y2="200"/><line x1="600" y1="0" x2="600" y2="200"/>
    <line x1="700" y1="0" x2="700" y2="200"/>
  </g>

  <!-- Core glow behind text -->
  <ellipse cx="400" cy="85" rx="250" ry="90" fill="url(#coreGlow)"/>

  <!-- Swarm topology: connection lines from center -->
  <g stroke="#e63946" stroke-width="0.5" opacity="0.2">
    <line x1="400" y1="88" x2="80" y2="40"/><line x1="400" y1="88" x2="720" y2="40"/>
    <line x1="400" y1="88" x2="50" y2="100"/><line x1="400" y1="88" x2="750" y2="100"/>
    <line x1="400" y1="88" x2="90" y2="160"/><line x1="400" y1="88" x2="710" y2="160"/>
    <line x1="400" y1="88" x2="160" y2="30"/><line x1="400" y1="88" x2="640" y2="30"/>
    <line x1="400" y1="88" x2="130" y2="130"/><line x1="400" y1="88" x2="670" y2="130"/>
    <line x1="400" y1="88" x2="200" y2="170"/><line x1="400" y1="88" x2="600" y2="170"/>
  </g>

  <!-- Inter-agent connections -->
  <g stroke="#ff6b35" stroke-width="0.3" opacity="0.1">
    <line x1="80" y1="40" x2="160" y2="30"/><line x1="720" y1="40" x2="640" y2="30"/>
    <line x1="50" y1="100" x2="130" y2="130"/><line x1="750" y1="100" x2="670" y2="130"/>
    <line x1="90" y1="160" x2="200" y2="170"/><line x1="710" y1="160" x2="600" y2="170"/>
  </g>

  <!-- Agent nodes: outer -->
  <g fill="#e63946" opacity="0.4">
    <circle cx="80" cy="40" r="2"/><circle cx="720" cy="40" r="2"/>
    <circle cx="50" cy="100" r="2"/><circle cx="750" cy="100" r="2"/>
    <circle cx="90" cy="160" r="2"/><circle cx="710" cy="160" r="2"/>
    <circle cx="160" cy="30" r="1.5"/><circle cx="640" cy="30" r="1.5"/>
    <circle cx="130" cy="130" r="1.5"/><circle cx="670" cy="130" r="1.5"/>
    <circle cx="200" cy="170" r="1.5"/><circle cx="600" cy="170" r="1.5"/>
  </g>

  <!-- Dust particles -->
  <g fill="#ff6b35" opacity="0.2">
    <circle cx="30" cy="60" r="1"/><circle cx="770" cy="60" r="1"/>
    <circle cx="25" cy="140" r="0.8"/><circle cx="775" cy="140" r="0.8"/>
    <circle cx="110" cy="10" r="0.8"/><circle cx="690" cy="10" r="0.8"/>
    <circle cx="170" cy="185" r="0.8"/><circle cx="630" cy="185" r="0.8"/>
  </g>

  <!-- Accent line -->
  <line x1="220" y1="122" x2="580" y2="122" stroke="url(#glow)" stroke-width="0.6" opacity="0.4"/>

  <!-- Title -->
  <text x="400" y="82" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="56" font-weight="bold" fill="#ffffff" filter="url(#textGlow)" letter-spacing="4">IOSwarm</text>

  <!-- Subtitle -->
  <text x="400" y="112" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="18" fill="#e63946" filter="url(#softGlow)" letter-spacing="6" opacity="0.9">DISTRIBUTED EXECUTION LAYER</text>

  <!-- Tagline -->
  <text x="400" y="168" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="13" fill="#555570" letter-spacing="2">36 delegates · agent swarm · 1,000,000 execution nodes</text>

  <!-- Corner brackets -->
  <g stroke="#e63946" stroke-width="1.2" fill="none" opacity="0.25">
    <path d="M 10 22 L 10 10 L 22 10"/><path d="M 778 10 L 790 10 L 790 22"/>
    <path d="M 10 178 L 10 190 L 22 190"/><path d="M 778 190 L 790 190 L 790 178"/>
  </g>
</svg>

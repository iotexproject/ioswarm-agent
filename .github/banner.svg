<svg xmlns="http://www.w3.org/2000/svg" width="900" height="300" viewBox="0 0 900 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06060c;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0e0b18;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#08060e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e63946;stop-opacity:0.6" />
      <stop offset="50%" style="stop-color:#ff6b35;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#e63946;stop-opacity:0.6" />
    </linearGradient>
    <radialGradient id="coreGlow" cx="50%" cy="46%" r="18%">
      <stop offset="0%" style="stop-color:#ff6b35;stop-opacity:0.35" />
      <stop offset="60%" style="stop-color:#e63946;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#e63946;stop-opacity:0" />
    </radialGradient>
    <radialGradient id="nodeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ff6b35;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#ff6b35;stop-opacity:0" />
    </radialGradient>
    <filter id="textGlow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="nodeBlur">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="300" fill="url(#bg)"/>

  <!-- Faint grid overlay -->
  <g opacity="0.04" stroke="#ff6b35">
    <line x1="0" y1="0" x2="0" y2="300" stroke-width="0.5"/>
    <line x1="60" y1="0" x2="60" y2="300" stroke-width="0.5"/>
    <line x1="120" y1="0" x2="120" y2="300" stroke-width="0.5"/>
    <line x1="180" y1="0" x2="180" y2="300" stroke-width="0.5"/>
    <line x1="240" y1="0" x2="240" y2="300" stroke-width="0.5"/>
    <line x1="300" y1="0" x2="300" y2="300" stroke-width="0.5"/>
    <line x1="360" y1="0" x2="360" y2="300" stroke-width="0.5"/>
    <line x1="420" y1="0" x2="420" y2="300" stroke-width="0.5"/>
    <line x1="480" y1="0" x2="480" y2="300" stroke-width="0.5"/>
    <line x1="540" y1="0" x2="540" y2="300" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="600" y2="300" stroke-width="0.5"/>
    <line x1="660" y1="0" x2="660" y2="300" stroke-width="0.5"/>
    <line x1="720" y1="0" x2="720" y2="300" stroke-width="0.5"/>
    <line x1="780" y1="0" x2="780" y2="300" stroke-width="0.5"/>
    <line x1="840" y1="0" x2="840" y2="300" stroke-width="0.5"/>
    <line x1="900" y1="0" x2="900" y2="300" stroke-width="0.5"/>
    <line x1="0" y1="60" x2="900" y2="60" stroke-width="0.5"/>
    <line x1="0" y1="120" x2="900" y2="120" stroke-width="0.5"/>
    <line x1="0" y1="180" x2="900" y2="180" stroke-width="0.5"/>
    <line x1="0" y1="240" x2="900" y2="240" stroke-width="0.5"/>
  </g>

  <!-- Central delegate core glow -->
  <ellipse cx="450" cy="138" rx="160" ry="120" fill="url(#coreGlow)"/>

  <!-- ===== SWARM TOPOLOGY: delegate center + agent nodes connected by lines ===== -->

  <!-- Connection lines from center (450,138) to agent nodes — drawn first so nodes overlay -->
  <g stroke="#e63946" stroke-width="0.6" opacity="0.25">
    <!-- Inner ring connections -->
    <line x1="450" y1="138" x2="340" y2="80"/>
    <line x1="450" y1="138" x2="560" y2="80"/>
    <line x1="450" y1="138" x2="310" y2="145"/>
    <line x1="450" y1="138" x2="590" y2="145"/>
    <line x1="450" y1="138" x2="345" y2="200"/>
    <line x1="450" y1="138" x2="555" y2="200"/>
    <line x1="450" y1="138" x2="450" y2="60"/>
    <line x1="450" y1="138" x2="450" y2="218"/>
    <!-- Outer ring connections -->
    <line x1="450" y1="138" x2="220" y2="55"/>
    <line x1="450" y1="138" x2="680" y2="55"/>
    <line x1="450" y1="138" x2="190" y2="138"/>
    <line x1="450" y1="138" x2="710" y2="138"/>
    <line x1="450" y1="138" x2="225" y2="220"/>
    <line x1="450" y1="138" x2="675" y2="220"/>
    <!-- Far scatter connections -->
    <line x1="450" y1="138" x2="100" y2="75"/>
    <line x1="450" y1="138" x2="800" y2="75"/>
    <line x1="450" y1="138" x2="80" y2="165"/>
    <line x1="450" y1="138" x2="820" y2="165"/>
    <line x1="450" y1="138" x2="130" y2="230"/>
    <line x1="450" y1="138" x2="770" y2="230"/>
    <line x1="450" y1="138" x2="280" y2="248"/>
    <line x1="450" y1="138" x2="620" y2="248"/>
  </g>

  <!-- Inter-agent connections (peer mesh hints) -->
  <g stroke="#ff6b35" stroke-width="0.3" opacity="0.12">
    <line x1="340" y1="80" x2="220" y2="55"/>
    <line x1="560" y1="80" x2="680" y2="55"/>
    <line x1="310" y1="145" x2="190" y2="138"/>
    <line x1="590" y1="145" x2="710" y2="138"/>
    <line x1="345" y1="200" x2="225" y2="220"/>
    <line x1="555" y1="200" x2="675" y2="220"/>
    <line x1="220" y1="55" x2="100" y2="75"/>
    <line x1="680" y1="55" x2="800" y2="75"/>
    <line x1="190" y1="138" x2="80" y2="165"/>
    <line x1="710" y1="138" x2="820" y2="165"/>
    <line x1="225" y1="220" x2="130" y2="230"/>
    <line x1="675" y1="220" x2="770" y2="230"/>
  </g>

  <!-- Central delegate node (larger, brighter) -->
  <circle cx="450" cy="138" r="8" fill="#ff6b35" opacity="0.15" filter="url(#nodeBlur)"/>
  <circle cx="450" cy="138" r="4" fill="#ff6b35" opacity="0.9"/>
  <circle cx="450" cy="138" r="2" fill="#ffffff" opacity="0.8"/>

  <!-- Inner ring agent nodes -->
  <g fill="#e63946" opacity="0.7">
    <circle cx="340" cy="80" r="2.5"/>
    <circle cx="560" cy="80" r="2.5"/>
    <circle cx="310" cy="145" r="2.5"/>
    <circle cx="590" cy="145" r="2.5"/>
    <circle cx="345" cy="200" r="2.5"/>
    <circle cx="555" cy="200" r="2.5"/>
    <circle cx="450" cy="60" r="2.5"/>
    <circle cx="450" cy="218" r="2.5"/>
  </g>

  <!-- Outer ring agent nodes -->
  <g fill="#e63946" opacity="0.5">
    <circle cx="220" cy="55" r="2"/>
    <circle cx="680" cy="55" r="2"/>
    <circle cx="190" cy="138" r="2"/>
    <circle cx="710" cy="138" r="2"/>
    <circle cx="225" cy="220" r="2"/>
    <circle cx="675" cy="220" r="2"/>
  </g>

  <!-- Far scatter agent nodes (smallest, faintest — the "millions") -->
  <g fill="#ff6b35" opacity="0.35">
    <circle cx="100" cy="75" r="1.5"/>
    <circle cx="800" cy="75" r="1.5"/>
    <circle cx="80" cy="165" r="1.5"/>
    <circle cx="820" cy="165" r="1.5"/>
    <circle cx="130" cy="230" r="1.5"/>
    <circle cx="770" cy="230" r="1.5"/>
    <circle cx="280" cy="248" r="1.5"/>
    <circle cx="620" cy="248" r="1.5"/>
  </g>

  <!-- Extra dust particles (the swarm keeps going...) -->
  <g fill="#e63946" opacity="0.2">
    <circle cx="50" cy="110" r="1"/>
    <circle cx="850" cy="110" r="1"/>
    <circle cx="65" cy="210" r="1"/>
    <circle cx="835" cy="210" r="1"/>
    <circle cx="155" cy="32" r="1"/>
    <circle cx="745" cy="32" r="1"/>
    <circle cx="170" cy="265" r="1"/>
    <circle cx="730" cy="265" r="1"/>
    <circle cx="35" cy="50" r="0.8"/>
    <circle cx="865" cy="50" r="0.8"/>
    <circle cx="40" cy="250" r="0.8"/>
    <circle cx="860" cy="250" r="0.8"/>
  </g>

  <!-- Horizontal accent line below title area -->
  <line x1="250" y1="178" x2="650" y2="178" stroke="url(#glow)" stroke-width="0.8" opacity="0.5"/>

  <!-- Main title — positioned above the topology center -->
  <text x="450" y="130" text-anchor="middle" font-family="'SF Mono', 'Fira Code', monospace, 'Courier New'" font-size="42" font-weight="bold" fill="#ffffff" filter="url(#textGlow)" letter-spacing="3">
    IOSwarm
  </text>

  <!-- Subtitle — the real concept -->
  <text x="450" y="158" text-anchor="middle" font-family="'SF Mono', 'Fira Code', monospace, 'Courier New'" font-size="13" fill="#e63946" filter="url(#softGlow)" letter-spacing="5" opacity="0.9">
    DISTRIBUTED EXECUTION LAYER
  </text>

  <!-- Bottom tagline — the scaling narrative -->
  <text x="450" y="260" text-anchor="middle" font-family="'SF Mono', 'Fira Code', monospace, 'Courier New'" font-size="11" fill="#555570" letter-spacing="2">
    36 delegates  ///  autonomous agent swarm  ///  1,000,000 execution nodes
  </text>

  <!-- Corner brackets -->
  <g stroke="#e63946" stroke-width="1.2" fill="none" opacity="0.3">
    <path d="M 12 28 L 12 12 L 28 12"/>
    <path d="M 872 12 L 888 12 L 888 28"/>
    <path d="M 12 272 L 12 288 L 28 288"/>
    <path d="M 872 288 L 888 288 L 888 272"/>
  </g>
</svg>
